name: keep-alive

# Render's free web service spins down after ~15 min idle. This pings /health every 10 min
# to keep it warm. Set a repo variable HEALTH_URL to your deployed URL, or edit the default below.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.HEALTH_URL || 'https://holla-backend.onrender.com/health' }}"
          echo "Pinging $URL"
          curl -fsS --max-time 40 "$URL" && echo "  ok" || echo "  ping failed (service may be cold-starting)"
